  # ── Nginx Reverse Proxy: Bảo vệ các service phía sau, xử lý SSL termination, CORS, rate limiting, v.v. ──────────────────────────────────────────────────────────────
  # Lý do dùng Nginx: Thay vì expose tất cả các service trực tiếp ra ngoài, chúng ta chỉ expose Nginx trên cổng 80/443.
  # Nginx sẽ làm nhiệm vụ reverse proxy, nhận request từ client và forward đến API Gateway hoặc các service khác dựa trên cấu hình.
  # Điều này giúp tăng cường bảo mật (chỉ có một điểm vào), dễ dàng quản lý SSL, và có thể thêm các tính năng như rate limiting, caching, v.v. nếu cần trong tương lai.

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - bin_app_net
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
