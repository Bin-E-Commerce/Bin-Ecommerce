version: "3.9"

# This compose file runs ALL 10 NestJS services + Nginx.
# Infra (Postgres, Mongo, Redis, Kafka, Keycloak) must be started separately:
#   docker compose -f infra/docker/docker-compose.infra.yml up -d

networks:
  bin_infra_net:
    external: true # shared with infra compose
  bin_app_net:
    driver: bridge

x-service-defaults: &service-defaults
  restart: unless-stopped
  env_file: .env
  networks:
    - bin_infra_net
    - bin_app_net
  deploy:
    resources:
      limits:
        memory: 150m # 100m heap + 50m headroom
      reservations:
        memory: 64m

services:
  # ── API Gateway ─────────────────────────────────────────────────────────────
  api-gateway:
    <<: *service-defaults
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    image: bin-ecommerce/api-gateway:local
    container_name: api-gateway
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NODE_ENV: development
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: bin-ecommerce
      AUTH_SERVICE_URL: http://auth-service:3001
      PRODUCT_SERVICE_URL: http://product-service:3002
      CART_SERVICE_URL: http://cart-service:3003
      ORDER_SERVICE_URL: http://order-service:3004
      INVENTORY_SERVICE_URL: http://inventory-service:3005
      NOTIFICATION_SERVICE_URL: http://notification-service:3006
      SHIPPING_SERVICE_URL: http://shipping-service:3007
      PROMOTION_SERVICE_URL: http://promotion-service:3008
      RETURN_SERVICE_URL: http://return-service:3009
      ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000
    depends_on:
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Auth Service ─────────────────────────────────────────────────────────────
  auth-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    image: bin-ecommerce/auth-service:local
    container_name: auth-service
    environment:
      PORT: 3001
      NODE_ENV: development
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: bin_auth
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: bin-ecommerce
      KEYCLOAK_CLIENT_ID: api-gateway
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      KAFKA_BROKERS: kafka:9092
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

