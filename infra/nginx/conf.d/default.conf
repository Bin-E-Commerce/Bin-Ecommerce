# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_global:10m rate=100r/m; # API endpoints non-auth (100 req/min/IP)
limit_req_zone $binary_remote_addr zone=auth_strict:10m  rate=10r/m; # Auth endpoints auth (10 req/min/IP)

# Dùng upstream để định nghĩa backend server (API Gateway) mà Nginx sẽ proxy requests đến. 
# Điều này giúp tách biệt cấu hình proxy và backend, làm cho cấu hình dễ quản lý hơn
# Đặc biệt khi bạn có nhiều backend servers hoặc muốn thêm load balancing trong tương lai.
upstream api_gateway {
    server api-gateway:3000;
    keepalive 32; # For better performance with many concurrent requests
}

server {
    listen 80; # Lắng nghe trên cổng 80 cho HTTP. Nếu bạn muốn hỗ trợ HTTPS, bạn sẽ cần thêm một server block khác với listen 443 và cấu hình SSL.
    server_name _; # Mục đích để chấp nhận tất cả các host header, vì API Gateway có thể được truy cập qua nhiều tên miền khác nhau (ví dụ: api.example.com, api.internal, v.v.)
    # Tuy nhiên khi lên production, bạn nên cân nhắc chỉ định server_name cụ thể để tăng cường bảo mật và tránh bị tấn công Host header injection.
    # Ví dụ server_name api.example.com; nếu bạn chỉ có một tên miền chính để truy cập API Gateway.

    # Security headers
    add_header X-Frame-Options           DENY            always; # Ngăn chặn clickjacking bằng cách không cho phép trang được nhúng trong iframe
    add_header X-Content-Type-Options    nosniff         always; # Ngăn chặn trình duyệt tự động sniff MIME type, giúp giảm nguy cơ tấn công XSS
    add_header X-XSS-Protection          "1; mode=block" always; # Kích hoạt bộ lọc XSS của trình duyệt, nếu phát hiện tấn công XSS sẽ chặn hiển thị trang
    add_header Referrer-Policy           strict-origin   always; # Chỉ gửi referrer khi cùng origin, giúp bảo vệ thông tin referrer khi người dùng nhấp vào liên kết từ API Gateway

    
    # Dùng cho các công cụ như Kubernetes liveness/readiness probes hoặc dịch vụ giám sát bên ngoài.
    # Mục đích để đảm bảo rằng API Gateway vẫn hoạt động và có thể xử lý các yêu cầu cơ bản, ngay cả khi có sự cố với các endpoint khác.
    # Và vì endpoint này chỉ trả về một response đơn giản, nên chúng ta có thể tắt access log để giảm bớt lưu lượng log không cần thiết.
    location = /health {
        proxy_pass         http://api_gateway;
        proxy_http_version 1.1; # Sử dụng HTTP/1.1 để hỗ trợ keep-alive connections, giúp cải thiện hiệu suất khi có nhiều yêu cầu liên tiếp đến endpoint này.
        proxy_set_header   Connection ""; # Đảm bảo rằng Nginx không thêm header Connection: close, cho phép giữ kết nối mở lâu hơn với backend server, giúp giảm latency cho các yêu cầu liên tiếp.
        access_log off; # Tắt access log cho endpoint này để giảm bớt lưu lượng log không cần thiết
    }

    # Auth endpoints — stricter rate limit (10 req/min/IP)
    # Dùng để bảo vệ các endpoint nhạy cảm liên quan đến xác thực người dùng, nơi mà việc bị tấn công brute-force hoặc credential stuffing
    location ~ ^/api/auth/(login|register|refresh|forgot-password|reset-password) {
        limit_req zone=auth_strict burst=5 nodelay; # Áp dụng 10 req/min/IP với burst 5 để cho phép một số lượng yêu cầu ngắn hạn mà không bị từ chối ngay lập tức, nhưng vẫn giữ giới hạn nghiêm ngặt cho các endpoint này.
        limit_req_status 429; # Trả về mã lỗi 429 Too Many Requests khi vượt quá giới hạn, giúp client biết rằng họ cần giảm tốc độ gửi yêu cầu.

        proxy_pass         http://api_gateway; # Proxy các yêu cầu đến API Gateway backend server đã định nghĩa trong upstream block.
        proxy_http_version 1.1; # Sử dụng HTTP/1.1 để hỗ trợ keep-alive connections, giúp cải thiện hiệu suất khi có nhiều yêu cầu liên tiếp đến endpoint này.
        proxy_set_header   Host              $host; # Đảm bảo rằng header Host được chuyển tiếp đúng từ client đến backend server, giúp backend server có thể xử lý yêu cầu dựa trên host nếu cần thiết (ví dụ: multi-tenant applications).
        proxy_set_header   X-Real-IP         $remote_addr; # Chuyển tiếp địa chỉ IP thực của client đến backend server, giúp backend server có thể ghi log hoặc thực hiện các kiểm tra dựa trên IP.
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for; # Thêm địa chỉ IP của client vào header X-Forwarded-For, giúp backend server biết được chuỗi các proxy mà yêu cầu đã đi qua.
        proxy_set_header   X-Forwarded-Proto $scheme; # Chuyển tiếp thông tin về giao thức (HTTP/HTTPS) mà client sử dụng, giúp backend server có thể xử lý yêu cầu đúng cách.
        proxy_set_header   Connection        ""; # Đảm bảo rằng Nginx không thêm header Connection: close, cho phép giữ kết nối mở lâu hơn với backend server, giúp giảm latency cho các yêu cầu liên tiếp.
        proxy_read_timeout 30s; # Đặt thời gian chờ đọc từ backend server, giúp tránh tình trạng treo kết nối nếu backend server phản hồi chậm.
    }

    # All other API routes — 100 req/min/IP
    location /api/ {
        limit_req zone=api_global burst=20 nodelay;
        limit_req_status 429;

        proxy_pass         http://api_gateway;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;
        proxy_buffering    off;
    }

    # Dùng để trả về lỗi 404 cho tất cả các yêu cầu không khớp với các location đã định nghĩa ở trên, giúp giảm bớt lưu lượng không cần thiết đến backend server và cải thiện bảo mật bằng cách không tiết lộ thông tin về các endpoint không tồn tại.
    location / {
        return 404;
    }

    # Dùng để trả về lỗi 429 và 5xx dưới dạng JSON, giúp client có thể dễ dàng xử lý lỗi và hiển thị thông báo phù hợp cho người dùng.
    error_page 429 /429.json;
    location = /429.json {
        default_type application/json;
        return 429 '{"statusCode":429,"message":"Too many requests, please slow down."}';
    }

    error_page 502 503 504 /5xx.json;
    location = /5xx.json {
        default_type application/json;
        return 502 '{"statusCode":502,"message":"Service temporarily unavailable."}';
    }
}
